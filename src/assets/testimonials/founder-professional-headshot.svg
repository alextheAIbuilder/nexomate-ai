
    <svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="professionalBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a365d;stop-opacity:0.1" />
          <stop offset="100%" style="stop-color:#d69e2e;stop-opacity:0.1" />
        </linearGradient>
        <radialGradient id="portraitGlow" cx="50%" cy="40%" r="60%">
          <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
          <stop offset="100%" style="stop-color:#f7fafc;stop-opacity:0.2" />
        </radialGradient>
      </defs>
      
      <!-- Professional background -->
      <rect width="400" height="500" fill="url(#professionalBg)"/>
      
      <!-- Portrait silhouette -->
      <ellipse cx="200" cy="200" rx="80" ry="100" fill="#1a365d" opacity="0.8"/>
      <rect x="120" y="180" width="160" height="20" fill="#1a365d" opacity="0.9" rx="10"/>
      
      <!-- Professional attire indication -->
      <rect x="160" y="280" width="80" height="120" fill="#1a365d" opacity="0.7" rx="5"/>
      <rect x="175" y="290" width="50" height="80" fill="#ffffff" opacity="0.9" rx="3"/>
      <rect x="190" y="300" width="20" height="60" fill="#d69e2e" rx="2"/>
      
      <!-- Glow effect for professional appearance -->
      <ellipse cx="200" cy="180" rx="90" ry="110" fill="url(#portraitGlow)" opacity="0.3"/>
      
      <!-- Professional credentials overlay -->
      <rect x="50" y="420" width="300" height="60" fill="rgba(26, 54, 93, 0.9)" rx="10"/>
      <text x="200" y="445" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="16" fill="white" font-weight="bold">
        Alex, Founder & CEO
      </text>
      <text x="200" y="465" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="#d69e2e">
        5+ Years Insurance Technology
      </text>
    </svg>
  