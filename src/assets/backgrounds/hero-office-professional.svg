
    <svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <!-- Background gradient -->
      <defs>
        <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a365d;stop-opacity:0.1" />
          <stop offset="50%" style="stop-color:#d69e2e;stop-opacity:0.05" />
          <stop offset="100%" style="stop-color:#38a169;stop-opacity:0.1" />
        </linearGradient>
        <pattern id="officeBg" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
          <rect width="100" height="100" fill="#f7fafc"/>
          <rect x="10" y="10" width="80" height="5" fill="#1a365d" opacity="0.1"/>
          <rect x="10" y="25" width="60" height="5" fill="#1a365d" opacity="0.1"/>
        </pattern>
      </defs>
      
      <rect width="1920" height="1080" fill="url(#officeBg)"/>
      <rect width="1920" height="1080" fill="url(#heroGradient)"/>
      
      <!-- Office furniture elements -->
      <rect x="100" y="400" width="300" height="200" fill="#1a365d" opacity="0.2" rx="10"/>
      <rect x="500" y="350" width="200" height="150" fill="#d69e2e" opacity="0.3" rx="5"/>
      
      <!-- AI technology elements -->
      <circle cx="800" cy="300" r="80" fill="#38a169" opacity="0.2"/>
      <circle cx="1200" cy="400" r="60" fill="#d69e2e" opacity="0.3"/>
      
      <!-- Text overlay area -->
      <rect x="100" y="100" width="800" height="300" fill="rgba(255,255,255,0.9)" rx="20"/>
      
      <!-- Professional touch -->
      <rect x="1400" y="200" width="400" height="600" fill="#1a365d" opacity="0.1" rx="15"/>
      
      <text x="150" y="200" font-family="Arial, sans-serif" font-size="24" fill="#1a365d" font-weight="bold">
        Professional Insurance Office Environment
      </text>
      <text x="150" y="240" font-family="Arial, sans-serif" font-size="16" fill="#2d3748">
        AI-Powered Automation Technology
      </text>
    </svg>
  