
    <svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Title -->
      <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="28" fill="#1a365d" font-weight="bold">
        Office Transformation: Manual vs AI-Powered
      </text>
      
      <!-- Before section -->
      <text x="300" y="80" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="20" fill="#e53e3e" font-weight="bold">
        BEFORE: Chaotic Manual Process
      </text>
      
      <!-- Chaotic office scene -->
      <rect x="50" y="100" width="500" height="300" fill="#fff5f5" stroke="#e53e3e" 
            stroke-width="3" rx="15"/>
      
      <!-- Scattered papers -->
      <rect x="80" y="130" width="60" height="40" fill="#e53e3e" opacity="0.7" 
            transform="rotate(15 110 150)"/>
      <rect x="150" y="160" width="60" height="40" fill="#e53e3e" opacity="0.7" 
            transform="rotate(-20 180 180)"/>
      <rect x="220" y="140" width="60" height="40" fill="#e53e3e" opacity="0.7" 
            transform="rotate(30 250 160)"/>
      
      <!-- Phone ringing (missed calls) -->
      <circle cx="400" cy="200" r="30" fill="#e53e3e"/>
      <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="white" font-weight="bold">
        RING
      </text>
      
      <!-- Stress indicators -->
      <text x="300" y="250" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#e53e3e">
        • 40% calls missed after hours
      </text>
      <text x="300" y="270" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#e53e3e">
        • 6 hours/day on data entry
      </text>
      <text x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#e53e3e">
        • Inconsistent follow-up
      </text>
      <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#e53e3e">
        • Lost leads and opportunities
      </text>
      
      <!-- After section -->
      <text x="900" y="80" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="20" fill="#38a169" font-weight="bold">
        AFTER: AI-Powered Efficiency
      </text>
      
      <!-- Organized office scene -->
      <rect x="650" y="100" width="500" height="300" fill="#f0fff4" stroke="#38a169" 
            stroke-width="3" rx="15"/>
      
      <!-- Clean, organized elements -->
      <rect x="700" y="140" width="100" height="60" fill="#38a169" opacity="0.3" rx="10"/>
      <text x="750" y="165" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="#1a365d">
        AI Dashboard
      </text>
      <text x="750" y="180" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="#1a365d">
        Active
      </text>
      
      <rect x="850" y="140" width="100" height="60" fill="#d69e2e" opacity="0.3" rx="10"/>
      <text x="900" y="165" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="#1a365d">
        Lead Queue
      </text>
      <text x="900" y="180" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="#1a365d">
        Organized
      </text>
      
      <rect x="1000" y="140" width="100" height="60" fill="#1a365d" opacity="0.3" rx="10"/>
      <text x="1050" y="165" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="white">
        Analytics
      </text>
      <text x="1050" y="180" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="12" fill="white">
        Live
      </text>
      
      <!-- Success indicators -->
      <text x="900" y="250" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#38a169">
        ✓ 98% call capture rate
      </text>
      <text x="900" y="270" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#38a169">
        ✓ 15+ hours saved weekly
      </text>
      <text x="900" y="290" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#38a169">
        ✓ Instant lead qualification
      </text>
      <text x="900" y="310" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="#38a169">
        ✓ 24/7 automated follow-up
      </text>
      
      <!-- Impact metrics -->
      <rect x="200" y="450" width="800" height="120" fill="#1a365d" rx="20"/>
      <text x="600" y="485" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="24" fill="white" font-weight="bold">
        Transformation Results
      </text>
      
      <text x="350" y="520" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="16" fill="#d69e2e" font-weight="bold">
        40% Revenue Increase
      </text>
      <text x="350" y="540" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="white">
        More qualified leads
      </text>
      
      <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="16" fill="#d69e2e" font-weight="bold">
        80% Time Savings
      </text>
      <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="white">
        On manual tasks
      </text>
      
      <text x="850" y="520" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="16" fill="#d69e2e" font-weight="bold">
        2.3x ROI
      </text>
      <text x="850" y="540" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="14" fill="white">
        Within 6 months
      </text>
      
      <!-- Call to action -->
      <rect x="400" y="620" width="400" height="60" fill="#d69e2e" rx="30"/>
      <text x="600" y="660" text-anchor="middle" font-family="Arial, sans-serif" 
            font-size="18" fill="white" font-weight="bold">
        Transform Your Agency Today
      </text>
    </svg>
  