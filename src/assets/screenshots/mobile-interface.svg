
    <svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
      <!-- Phone frame -->
      <rect width="375" height="812" fill="#000000" rx="40"/>
      <rect x="10" y="10" width="355" height="792" fill="#ffffff" rx="30"/>
      
      <!-- Status bar -->
      <rect x="20" y="40" width="335" height="30" fill="#1a365d"/>
      <text x="30" y="58" font-family="Arial, sans-serif" font-size="14" fill="white">
        NexomateAI Mobile
      </text>
      <text x="280" y="58" font-family="Arial, sans-serif" font-size="12" fill="white">
        100%
      </text>
      
      <!-- Main interface -->
      <rect x="20" y="90" width="335" height="150" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1" rx="10"/>
      <text x="40" y="120" font-family="Arial, sans-serif" font-size="18" fill="#1a365d" font-weight="bold">
        Today's Activity
      </text>
      <text x="40" y="150" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">
        15 calls handled
      </text>
      <text x="40" y="170" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">
        8 new leads generated
      </text>
      <text x="40" y="190" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">
        3 appointments booked
      </text>
      
      <!-- Quick actions -->
      <rect x="20" y="260" width="100" height="80" fill="#38a169" rx="10"/>
      <text x="40" y="290" font-family="Arial, sans-serif" font-size="12" fill="white">
        View
      </text>
      <text x="40" y="305" font-family="Arial, sans-serif" font-size="12" fill="white">
        Leads
      </text>
      
      <rect x="140" y="260" width="100" height="80" fill="#d69e2e" rx="10"/>
      <text x="160" y="290" font-family="Arial, sans-serif" font-size="12" fill="white">
        Call
      </text>
      <text x="160" y="305" font-family="Arial, sans-serif" font-size="12" fill="white">
        Log
      </text>
      
      <rect x="260" y="260" width="95" height="80" fill="#1a365d" rx="10"/>
      <text x="280" y="290" font-family="Arial, sans-serif" font-size="12" fill="white">
        Settings
      </text>
    </svg>
  